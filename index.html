<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yzim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #1d1d1f;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      max-width: 640px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 1.125rem;
      color: #6e6e73;
      margin-bottom: 2rem;
    }

    section {
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #1d1d1f;
    }

    p {
      color: #424245;
      margin-bottom: 0.75rem;
    }

    .links a {
      display: inline-block;
      color: #0066cc;
      text-decoration: none;
      font-weight: 500;
      margin-right: 1rem;
    }

    .links a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.875rem;
      color: #86868b;
    }
  </style>
</head>
<body>
  <main>
    <h1>yzim</h1>
    <p class="subtitle">a place for things i build and think about</p>

    <section>
      <h2>about</h2>
      <p>hello. i build software, design systems, and explore ideas at the intersection of code and craft.</p>
    </section>

    <section>
      <h2>projects</h2>
      <p>nothing here yet — check back soon.</p>
    </section>

    <section class="links">
      <h2>elsewhere</h2>
      <a href="https://github.com/yzim">github</a>
    </section>

    <footer>&copy; 2026 yzim</footer>
  </main>
</body>
</html>
